name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # Pin to the marimo version used locally so the WASM bundle matches
      - run: pip install marimo==0.23.13
      # html-wasm packages the notebook code + public/ data; no Python
      # execution happens here — the visitor's browser runs it via Pyodide.
      - name: Export dashboard to WASM HTML
        run: marimo export html-wasm dashboard.py -o dist --mode run
      - name: Add static notebook exports and .nojekyll
        run: |
          mkdir -p dist/notebooks
          cp site/notebooks/*.html dist/notebooks/
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
